<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Quản lý công việc thông minh</title>
  <meta name="description" content="TaskFlow – Ứng dụng quản lý công việc hiện đại với Firebase sync, hỗ trợ đa thiết bị."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- ===== LOGIN SCREEN ===== -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">TaskFlow</span>
      </div>
      <h2 class="login-title">Chào mừng trở lại!</h2>
      <p class="login-sub">Đăng nhập để đồng bộ công việc của bạn<br/>trên mọi thiết bị.</p>

      <button class="btn-google" id="googleSignInBtn">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        Đăng nhập với Google
      </button>

      <p class="login-note">🔒 Dữ liệu của bạn được bảo mật và chỉ bạn mới xem được</p>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div class="app-wrapper" id="appWrapper" style="display:none">

    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        <p class="header-date" id="headerDate"></p>
      </div>
      <div class="header-right">
        <div class="stats-pill">
          <span id="statsDone">0</span>/<span id="statsTotal">0</span>
          <span class="stats-label">hoàn thành</span>
        </div>
        <div class="user-menu" id="userMenu">
          <img class="user-avatar" id="userAvatar" src="" alt="avatar"/>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-email" id="userEmail"></span>
            </div>
            <button class="btn-signout" id="signOutBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Đăng xuất
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Sync status -->
    <div class="sync-bar" id="syncBar" style="display:none">
      <span class="sync-dot"></span>
      <span id="syncText">Đang đồng bộ...</span>
    </div>

    <!-- Progress Bar -->
    <div class="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <span class="progress-text" id="progressText">0%</span>
    </div>

    <!-- Input Area -->
    <div class="input-card">
      <div class="input-row">
        <input
          type="text"
          id="taskInput"
          placeholder="Thêm công việc mới..."
          autocomplete="off"
          maxlength="200"
        />
        <button id="addBtn" class="btn-add" title="Thêm task">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="input-meta">
        <div class="meta-group">
          <label class="meta-label">Danh mục</label>
          <div class="category-pills" id="categorySelect">
            <button class="cat-pill active" data-cat="personal">👤 Cá nhân</button>
            <button class="cat-pill" data-cat="work">💼 Công việc</button>
            <button class="cat-pill" data-cat="study">📚 Học tập</button>
            <button class="cat-pill" data-cat="health">❤️ Sức khỏe</button>
            <button class="cat-pill" data-cat="other">🌀 Khác</button>
          </div>
        </div>
        <div class="meta-group">
          <label class="meta-label">Ưu tiên</label>
          <div class="priority-pills" id="prioritySelect">
            <button class="pri-pill" data-pri="low">🟢 Thấp</button>
            <button class="pri-pill active" data-pri="medium">🟡 Trung bình</button>
            <button class="pri-pill" data-pri="high">🔴 Cao</button>
          </div>
        </div>
        <div class="meta-group">
          <label class="meta-label">Hạn chót</label>
          <input type="date" id="dueDateInput" class="date-input"/>
        </div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Tất cả</button>
        <button class="filter-tab" data-filter="active">Đang làm</button>
        <button class="filter-tab" data-filter="completed">Hoàn thành</button>
      </div>
      <div class="filter-right">
        <select id="catFilter" class="cat-filter-select">
          <option value="all">Tất cả danh mục</option>
          <option value="personal">👤 Cá nhân</option>
          <option value="work">💼 Công việc</option>
          <option value="study">📚 Học tập</option>
          <option value="health">❤️ Sức khỏe</option>
          <option value="other">🌀 Khác</option>
        </select>
        <button class="btn-clear-done" id="clearDoneBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Xóa đã xong
        </button>
      </div>
    </div>

    <!-- Task List -->
    <div class="task-list" id="taskList"></div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display:none">
      <div class="empty-icon">🎯</div>
      <h3>Chưa có công việc nào!</h3>
      <p>Thêm một task mới để bắt đầu ngày làm việc hiệu quả.</p>
    </div>

  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
      <div class="modal-header">
        <h3>Chỉnh sửa công việc</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <input type="text" id="editInput" class="modal-input" maxlength="200"/>
      <div class="input-meta">
        <div class="meta-group">
          <label class="meta-label">Danh mục</label>
          <div class="category-pills" id="editCategorySelect">
            <button class="cat-pill active" data-cat="personal">👤 Cá nhân</button>
            <button class="cat-pill" data-cat="work">💼 Công việc</button>
            <button class="cat-pill" data-cat="study">📚 Học tập</button>
            <button class="cat-pill" data-cat="health">❤️ Sức khỏe</button>
            <button class="cat-pill" data-cat="other">🌀 Khác</button>
          </div>
        </div>
        <div class="meta-group">
          <label class="meta-label">Ưu tiên</label>
          <div class="priority-pills" id="editPrioritySelect">
            <button class="pri-pill" data-pri="low">🟢 Thấp</button>
            <button class="pri-pill active" data-pri="medium">🟡 Trung bình</button>
            <button class="pri-pill" data-pri="high">🔴 Cao</button>
          </div>
        </div>
        <div class="meta-group">
          <label class="meta-label">Hạn chót</label>
          <input type="date" id="editDueDateInput" class="date-input"/>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modalCancelBtn">Hủy</button>
        <button class="btn-save" id="modalSaveBtn">Lưu thay đổi</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Firebase Config – REPLACE with your own config -->
  <script src="firebase-config.js"></script>

  <script src="app.js"></script>
</body>
</html>
